name: deploy

on:
  pull_request:
  push:
    tags:
      - '*'

jobs:
  plan-production:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_NAME: ${{ secrets.RAILWAY_PROJECT_NAME }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
      RAW_NEXT_PUBLIC_SERVER_URL: ${{ secrets.NEXT_PUBLIC_SERVER_URL != '' && secrets.NEXT_PUBLIC_SERVER_URL || vars.NEXT_PUBLIC_SERVER_URL }}
      RAW_MARKETING_APP_BASE_URL: ${{ secrets.MARKETING_APP_BASE_URL != '' && secrets.MARKETING_APP_BASE_URL || vars.MARKETING_APP_BASE_URL }}
      RAW_COURSES_APP_BASE_URL: ${{ secrets.COURSES_APP_BASE_URL != '' && secrets.COURSES_APP_BASE_URL || vars.COURSES_APP_BASE_URL }}
      RAW_REVALIDATE_TIMEOUT_MS: ${{ secrets.REVALIDATE_TIMEOUT_MS != '' && secrets.REVALIDATE_TIMEOUT_MS || vars.REVALIDATE_TIMEOUT_MS }}
      RAW_RAILWAY_ENABLED: ${{ secrets.RAILWAY_ENABLED != '' && secrets.RAILWAY_ENABLED || vars.RAILWAY_ENABLED }}
      RAW_POSTGRES_DATABASE_NAME: ${{ secrets.POSTGRES_DATABASE_NAME != '' && secrets.POSTGRES_DATABASE_NAME || vars.POSTGRES_DATABASE_NAME }}
      RAW_POSTGRES_USER: ${{ secrets.POSTGRES_USER != '' && secrets.POSTGRES_USER || vars.POSTGRES_USER }}
      RAW_R2_ENABLED: ${{ secrets.R2_ENABLED != '' && secrets.R2_ENABLED || vars.R2_ENABLED }}
      RAW_CLOUDFLARE_DNS_ENABLED: ${{ secrets.CLOUDFLARE_DNS_ENABLED != '' && secrets.CLOUDFLARE_DNS_ENABLED || vars.CLOUDFLARE_DNS_ENABLED }}
      RAW_CLOUDFLARE_ZONE_NAME: ${{ secrets.CLOUDFLARE_ZONE_NAME != '' && secrets.CLOUDFLARE_ZONE_NAME || vars.CLOUDFLARE_ZONE_NAME }}
      RAW_CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID != '' && secrets.CLOUDFLARE_ZONE_ID || vars.CLOUDFLARE_ZONE_ID }}
      RAW_R2_PUBLIC_HOSTNAME: ${{ secrets.R2_PUBLIC_HOSTNAME != '' && secrets.R2_PUBLIC_HOSTNAME || vars.R2_PUBLIC_HOSTNAME }}
      RAW_ALPHA_BASIC_AUTH_USERNAME: ${{ secrets.ALPHA_BASIC_AUTH_USERNAME != '' && secrets.ALPHA_BASIC_AUTH_USERNAME || vars.ALPHA_BASIC_AUTH_USERNAME }}
      RAW_ALPHA_BASIC_AUTH_PASSWORD: ${{ secrets.ALPHA_BASIC_AUTH_PASSWORD != '' && secrets.ALPHA_BASIC_AUTH_PASSWORD || vars.ALPHA_BASIC_AUTH_PASSWORD }}
      RAW_BACKEND_PAYLOAD_SECRET: ${{ secrets.BACKEND_PAYLOAD_SECRET }}
      RAW_BACKEND_CRON_SECRET: ${{ secrets.BACKEND_CRON_SECRET }}
      RAW_BACKEND_PREVIEW_SECRET: ${{ secrets.BACKEND_PREVIEW_SECRET }}
      RAW_BACKEND_REVALIDATE_SECRET: ${{ secrets.BACKEND_REVALIDATE_SECRET }}
      RAW_POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      RAW_RESEND_API_KEY: ${{ secrets.RESEND_API_KEY != '' && secrets.RESEND_API_KEY || vars.RESEND_API_KEY }}
      RAW_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      RAW_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      RAW_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT != '' && secrets.R2_ENDPOINT || vars.R2_ENDPOINT }}
      RAW_R2_BUCKET: ${{ secrets.R2_BUCKET != '' && secrets.R2_BUCKET || vars.R2_BUCKET }}
      RAW_R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL != '' && secrets.R2_PUBLIC_BASE_URL || vars.R2_PUBLIC_BASE_URL }}
      RAW_R2_REGION: ${{ secrets.R2_REGION != '' && secrets.R2_REGION || vars.R2_REGION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write production tfvars file
        run: |
          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          def get(name: str) -> str:
              return os.environ.get(name, '').strip()

          def get_bool(name: str, default: bool) -> bool:
              value = get(name).lower()
              if value in {'true', '1', 'yes'}:
                  return True
              if value in {'false', '0', 'no'}:
                  return False
              return default

          def optional(name: str):
              value = get(name)
              return value or None

           payload = {
               'railway_project_name': get('RAILWAY_PROJECT_NAME') or 'open-agency-production',
               'railway_enabled': get_bool('RAW_RAILWAY_ENABLED', False),
               'cloudflare_dns_enabled': get_bool('RAW_CLOUDFLARE_DNS_ENABLED', False),
               'r2_enabled': True,
               'cloudflare_zone_name': get('RAW_CLOUDFLARE_ZONE_NAME') or 'open-agency.io',
               'cloudflare_zone_id': optional('RAW_CLOUDFLARE_ZONE_ID'),
               'cloudflare_account_id': get('CLOUDFLARE_ACCOUNT_ID') or 'replace-with-production-cloudflare-account-id',
              'marketing_app_base_url': get('RAW_MARKETING_APP_BASE_URL') or 'https://open-agency.io',
              'courses_app_base_url': get('RAW_COURSES_APP_BASE_URL') or 'https://courses.open-agency.io',
              'r2_public_hostname': get('RAW_R2_PUBLIC_HOSTNAME') or 'media.open-agency.io',
              'postgres_database_name': get('RAW_POSTGRES_DATABASE_NAME') or 'open_agency',
              'postgres_user': get('RAW_POSTGRES_USER') or 'open_agency',
              'postgres_password': get('RAW_POSTGRES_PASSWORD') or 'replace-with-production-postgres-password',
               'backend_secret_environment': {
                   'PAYLOAD_SECRET': get('RAW_BACKEND_PAYLOAD_SECRET') or 'replace-with-production-payload-secret',
                   'CRON_SECRET': get('RAW_BACKEND_CRON_SECRET') or 'replace-with-production-cron-secret',
                   'PREVIEW_SECRET': get('RAW_BACKEND_PREVIEW_SECRET') or 'replace-with-production-preview-secret',
                   'REVALIDATE_SECRET': get('RAW_BACKEND_REVALIDATE_SECRET') or 'replace-with-production-revalidate-secret',
                   'RESEND_API_KEY': get('RAW_RESEND_API_KEY') or 'replace-with-production-resend-api-key',
               },
           }

          optional_backend_environment = {
              key: value
              for key, value in {
                  'ALPHA_BASIC_AUTH_USERNAME': optional('RAW_ALPHA_BASIC_AUTH_USERNAME'),
                  'ALPHA_BASIC_AUTH_PASSWORD': optional('RAW_ALPHA_BASIC_AUTH_PASSWORD'),
                  'R2_ACCESS_KEY_ID': optional('RAW_R2_ACCESS_KEY_ID'),
                  'R2_SECRET_ACCESS_KEY': optional('RAW_R2_SECRET_ACCESS_KEY'),
                  'R2_ENDPOINT': optional('RAW_R2_ENDPOINT'),
                  'R2_BUCKET': optional('RAW_R2_BUCKET'),
                  'R2_PUBLIC_BASE_URL': optional('RAW_R2_PUBLIC_BASE_URL'),
                  'R2_REGION': optional('RAW_R2_REGION'),
                  'REVALIDATE_TIMEOUT_MS': optional('RAW_REVALIDATE_TIMEOUT_MS'),
              }.items()
              if value is not None
          }

          if optional_backend_environment:
              payload['backend_optional_environment'] = optional_backend_environment

          tfvars_path = Path('infra/environments/production/github.auto.tfvars.json')
          tfvars_path.write_text(json.dumps(payload, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "latest"

      - name: Init production environment
        run: tofu -chdir=infra/environments/production init

      - name: Plan production environment
        run: tofu -chdir=infra/environments/production plan -var=railway_token="$RAILWAY_TOKEN"

  apply-production:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: plan-production
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_NAME: ${{ secrets.RAILWAY_PROJECT_NAME }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
      RAW_NEXT_PUBLIC_SERVER_URL: ${{ secrets.NEXT_PUBLIC_SERVER_URL != '' && secrets.NEXT_PUBLIC_SERVER_URL || vars.NEXT_PUBLIC_SERVER_URL }}
      RAW_MARKETING_APP_BASE_URL: ${{ secrets.MARKETING_APP_BASE_URL != '' && secrets.MARKETING_APP_BASE_URL || vars.MARKETING_APP_BASE_URL }}
      RAW_COURSES_APP_BASE_URL: ${{ secrets.COURSES_APP_BASE_URL != '' && secrets.COURSES_APP_BASE_URL || vars.COURSES_APP_BASE_URL }}
      RAW_REVALIDATE_TIMEOUT_MS: ${{ secrets.REVALIDATE_TIMEOUT_MS != '' && secrets.REVALIDATE_TIMEOUT_MS || vars.REVALIDATE_TIMEOUT_MS }}
      RAW_RAILWAY_ENABLED: ${{ secrets.RAILWAY_ENABLED != '' && secrets.RAILWAY_ENABLED || vars.RAILWAY_ENABLED }}
      RAW_RAILWAY_PROJECT_NAME: ${{ secrets.RAILWAY_PROJECT_NAME != '' && secrets.RAILWAY_PROJECT_NAME || vars.RAILWAY_PROJECT_NAME }}
      RAW_POSTGRES_DATABASE_NAME: ${{ secrets.POSTGRES_DATABASE_NAME != '' && secrets.POSTGRES_DATABASE_NAME || vars.POSTGRES_DATABASE_NAME }}
      RAW_POSTGRES_USER: ${{ secrets.POSTGRES_USER != '' && secrets.POSTGRES_USER || vars.POSTGRES_USER }}
      RAW_R2_ENABLED: ${{ secrets.R2_ENABLED != '' && secrets.R2_ENABLED || vars.R2_ENABLED }}
      RAW_CLOUDFLARE_DNS_ENABLED: ${{ secrets.CLOUDFLARE_DNS_ENABLED != '' && secrets.CLOUDFLARE_DNS_ENABLED || vars.CLOUDFLARE_DNS_ENABLED }}
      RAW_CLOUDFLARE_ZONE_NAME: ${{ secrets.CLOUDFLARE_ZONE_NAME != '' && secrets.CLOUDFLARE_ZONE_NAME || vars.CLOUDFLARE_ZONE_NAME }}
      RAW_CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID != '' && secrets.CLOUDFLARE_ZONE_ID || vars.CLOUDFLARE_ZONE_ID }}
      RAW_R2_PUBLIC_HOSTNAME: ${{ secrets.R2_PUBLIC_HOSTNAME != '' && secrets.R2_PUBLIC_HOSTNAME || vars.R2_PUBLIC_HOSTNAME }}
      RAW_ALPHA_BASIC_AUTH_USERNAME: ${{ secrets.ALPHA_BASIC_AUTH_USERNAME != '' && secrets.ALPHA_BASIC_AUTH_USERNAME || vars.ALPHA_BASIC_AUTH_USERNAME }}
      RAW_ALPHA_BASIC_AUTH_PASSWORD: ${{ secrets.ALPHA_BASIC_AUTH_PASSWORD != '' && secrets.ALPHA_BASIC_AUTH_PASSWORD || vars.ALPHA_BASIC_AUTH_PASSWORD }}
      RAW_BACKEND_PAYLOAD_SECRET: ${{ secrets.BACKEND_PAYLOAD_SECRET }}
      RAW_BACKEND_CRON_SECRET: ${{ secrets.BACKEND_CRON_SECRET }}
      RAW_BACKEND_PREVIEW_SECRET: ${{ secrets.BACKEND_PREVIEW_SECRET }}
      RAW_BACKEND_REVALIDATE_SECRET: ${{ secrets.BACKEND_REVALIDATE_SECRET }}
      RAW_POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      RAW_RESEND_API_KEY: ${{ secrets.RESEND_API_KEY != '' && secrets.RESEND_API_KEY || vars.RESEND_API_KEY }}
      RAW_RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAW_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      RAW_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      RAW_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      RAW_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      RAW_RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAW_RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID != '' && secrets.RAILWAY_PROJECT_ID || vars.RAILWAY_PROJECT_ID }}
      RAW_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT != '' && secrets.R2_ENDPOINT || vars.R2_ENDPOINT }}
      RAW_R2_BUCKET: ${{ secrets.R2_BUCKET != '' && secrets.R2_BUCKET || vars.R2_BUCKET }}
      RAW_R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL != '' && secrets.R2_PUBLIC_BASE_URL || vars.R2_PUBLIC_BASE_URL }}
      RAW_R2_REGION: ${{ secrets.R2_REGION != '' && secrets.R2_REGION || vars.R2_REGION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "latest"

      - name: Write production tfvars file
        run: |
          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          def get(name: str) -> str:
              return os.environ.get(name, '').strip()

          def get_bool(name: str, default: bool) -> bool:
              value = get(name).lower()
              if value in {'true', '1', 'yes'}:
                  return True
              if value in {'false', '0', 'no'}:
                  return False
              return default

          def optional(name: str):
              value = get(name)
              return value or None

          payload = {
              'railway_project_name': get('RAW_RAILWAY_PROJECT_NAME') or 'open-agency-production',
              'railway_enabled': get_bool('RAW_RAILWAY_ENABLED', False),
              'cloudflare_dns_enabled': get_bool('RAW_CLOUDFLARE_DNS_ENABLED', False),
              'r2_enabled': True,
              'cloudflare_zone_name': get('RAW_CLOUDFLARE_ZONE_NAME') or 'open-agency.io',
              'cloudflare_zone_id': optional('RAW_CLOUDFLARE_ZONE_ID'),
              'cloudflare_account_id': get('RAW_CLOUDFLARE_ACCOUNT_ID') or 'replace-with-production-cloudflare-account-id',
              'marketing_app_base_url': get('RAW_MARKETING_APP_BASE_URL') or 'https://open-agency.io',
              'courses_app_base_url': get('RAW_COURSES_APP_BASE_URL') or 'https://courses.open-agency.io',
              'r2_public_hostname': get('RAW_R2_PUBLIC_HOSTNAME') or 'media.open-agency.io',
              'postgres_database_name': get('RAW_POSTGRES_DATABASE_NAME') or 'open_agency',
              'postgres_user': get('RAW_POSTGRES_USER') or 'open_agency',
              'postgres_password': get('RAW_POSTGRES_PASSWORD') or 'replace-with-production-postgres-password',
              'backend_secret_environment': {
                  'PAYLOAD_SECRET': get('RAW_BACKEND_PAYLOAD_SECRET') or 'replace-with-production-payload-secret',
                  'CRON_SECRET': get('RAW_BACKEND_CRON_SECRET') or 'replace-with-production-cron-secret',
                  'PREVIEW_SECRET': get('RAW_BACKEND_PREVIEW_SECRET') or 'replace-with-production-preview-secret',
                  'REVALIDATE_SECRET': get('RAW_BACKEND_REVALIDATE_SECRET') or 'replace-with-production-revalidate-secret',
              },
          }

          optional_backend_environment = {
              key: value
              for key, value in {
                  'ALPHA_BASIC_AUTH_USERNAME': optional('RAW_ALPHA_BASIC_AUTH_USERNAME'),
                  'ALPHA_BASIC_AUTH_PASSWORD': optional('RAW_ALPHA_BASIC_AUTH_PASSWORD'),
                  'R2_ACCESS_KEY_ID': optional('RAW_R2_ACCESS_KEY_ID'),
                  'R2_SECRET_ACCESS_KEY': optional('RAW_R2_SECRET_ACCESS_KEY'),
                  'R2_ENDPOINT': optional('RAW_R2_ENDPOINT'),
                  'R2_BUCKET': optional('RAW_R2_BUCKET'),
                  'R2_PUBLIC_BASE_URL': optional('RAW_R2_PUBLIC_BASE_URL'),
                  'R2_REGION': optional('RAW_R2_REGION'),
                  'RESEND_API_KEY': optional('RAW_RESEND_API_KEY'),
                  'REVALIDATE_TIMEOUT_MS': optional('RAW_REVALIDATE_TIMEOUT_MS'),
               }.items()
              if value is not None
          }

          if optional_backend_environment:
              payload['backend_optional_environment'] = optional_backend_environment

          tfvars_path = Path('infra/environments/production/github.auto.tfvars.json')
          tfvars_path.write_text(json.dumps(payload, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "latest"

      - name: Init production environment
        run: tofu -chdir=infra/environments/production init

      - name: Apply production environment
        run: tofu -chdir=infra/environments/production apply -var=railway_token="$RAILWAY_TOKEN" -auto-approve

  deploy-backend:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: apply-production
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    environment: production
    permissions:
      contents: read
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy backend to Railway
        run: |
          set -eu

          : "${R2_BUCKET:?Missing required R2_BUCKET secret or variable.}"
          : "${R2_ENDPOINT:?Missing required R2_ENDPOINT secret or variable.}"
          : "${R2_PUBLIC_BASE_URL:?Missing required R2_PUBLIC_BASE_URL secret or variable.}"
          : "${R2_ACCESS_KEY_ID:?Missing required R2_ACCESS_KEY_ID secret or variable.}"
          : "${R2_SECRET_ACCESS_KEY:?Missing required R2_SECRET_ACCESS_KEY secret or variable.}"
          : "${RESEND_API_KEY:?Missing required RESEND_API_KEY secret or variable.}"

          railway variables set \
            R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
            R2_BUCKET="$R2_BUCKET" \
            R2_ENDPOINT="$R2_ENDPOINT" \
            R2_PUBLIC_BASE_URL="$R2_PUBLIC_BASE_URL" \
            R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
            RESEND_API_KEY="$RESEND_API_KEY" \
            --service open-agency-backend-production \
            --environment production \
            --skip-deploys

          # Debug: Print Railway variables
          echo "=== Railway Variables ==="
          railway variables --service open-agency-backend-production

          # Debug: Print service status before deploy
          echo "=== Service Status Before ==="
          railway service open-agency-backend-production || true

          # Deploy with verbose output
          railway up ./backend/openagency-backend --path-as-root --project "$RAILWAY_PROJECT_ID" --service open-agency-backend-production --environment production --ci

          # Debug: Print deployment status
          echo "=== Waiting for deployment ==="
          # Give the deployed container time to start and run its startup migration.
          sleep 45
          railway status open-agency-backend-production || true
          railway logs open-agency-backend-production --tail 100 || true
