version: '3'

tasks:
  install:
    desc: Install all dependencies
    cmds:
      - pnpm --dir frontend install
      - pnpm --dir backend/openagency-backend install

  install-frontend:
    desc: Install frontend dependencies
    cmds:
      - pnpm --dir frontend install

  install-backend:
    desc: Install backend dependencies
    cmds:
      - pnpm --dir backend/openagency-backend install

  dev:
    desc: Start development servers
    cmds:
      - pnpm --dir frontend dev

  dev-frontend:
    desc: Start frontend development servers
    cmds:
      - pnpm --dir frontend dev

  dev-backend:
    desc: Start backend development server
    cmds:
      - PORT=3002 NEXT_PUBLIC_SERVER_URL=http://localhost:3002 pnpm --dir backend/openagency-backend dev

  build:
    desc: Build all projects
    cmds:
      - pnpm --dir frontend build
      - pnpm --dir backend/openagency-backend build

  build-frontend:
    desc: Build frontend
    cmds:
      - pnpm --dir frontend build

  build-backend:
    desc: Build backend
    cmds:
      - pnpm --dir backend/openagency-backend build

  lint:
    desc: Lint all projects
    cmds:
      - pnpm --dir frontend lint

  lint-frontend:
    desc: Lint frontend
    cmds:
      - pnpm --dir frontend lint

  lint-backend:
    desc: Lint backend
    cmds:
      - pnpm --dir backend/openagency-backend lint

  test:
    desc: Run tests
    cmds:
      - pnpm --dir frontend test

  test-frontend:
    desc: Run frontend tests
    cmds:
      - pnpm --dir frontend test

  clean:
    desc: Clean all build artifacts
    cmds:
      - pnpm --dir frontend clean
      - pnpm --dir backend/openagency-backend clean

  clean-frontend:
    desc: Clean frontend build artifacts
    cmds:
      - pnpm --dir frontend clean

  clean-backend:
    desc: Clean backend build artifacts
    cmds:
      - pnpm --dir backend/openagency-backend clean

  check:
    desc: Run all checks (lint + test)
    cmds:
      - pnpm --dir frontend lint
      - pnpm --dir frontend test