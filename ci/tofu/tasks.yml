version: '3'

tasks:
  init-production:
    desc: Initialize OpenTofu for production
    cmds:
      - devbox run tofu -chdir=infra/environments/production init -backend-config=backend.hcl

  validate:
    desc: Validate OpenTofu configurations
    cmds:
      - devbox run tofu validate
      - devbox run tofu -chdir=infra/environments/production validate -backend-config=backend.hcl

  plan-production:
    desc: Plan production infrastructure changes
    env:
      TF_LOG: DEBUG
    cmds:
      - devbox run tofu -chdir=infra/environments/production plan -backend-config=backend.hcl

  apply-production:
    desc: Apply production infrastructure changes
    env:
      TF_LOG: DEBUG
    cmds:
      - devbox run tofu -chdir=infra/environments/production apply -backend-config=backend.hcl -auto-approve

  destroy-production:
    desc: Destroy production infrastructure
    env:
      TF_LOG: DEBUG
    cmds:
      - devbox run tofu -chdir=infra/environments/production destroy -auto-approve
