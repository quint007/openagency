         fi
         if [ -n "${R2_BUCKET:-}" ]; then
           OPTIONAL_BACKEND_ENV="$OPTIONAL_BACKEND_ENV,R2_BUCKET=\"$R2_BUCKET\""
         fi
         if [ -n "${R2_PUBLIC_BASE_URL:-}" ]; then
           OPTIONAL_BACKEND_ENV="$OPTIONAL_BACKEND_ENV,R2_PUBLIC_BASE_URL=\"$R2_PUBLIC_BASE_URL\""
         fi
         if [ -n "${R2_REGION:-}" ]; then
           OPTIONAL_BACKEND_ENV="$OPTIONAL_BACKEND_ENV,R2_REGION=\"$R2_REGION\""
         fi
         if [ -n "${R2_ACCESS_KEY_ID:-}" ]; then
           OPTIONAL_BACKEND_ENV="$OPTIONAL_BACKEND_ENV,R2_ACCESS_KEY_ID=\"$R2_ACCESS_KEY_ID\""
         fi
          if [ -n "${R2_SECRET_ACCESS_KEY:-}" ]; then
            OPTIONAL_BACKEND_ENV="$OPTIONAL_BACKEND_ENV,R2_SECRET_ACCESS_KEY=\"$R2_SECRET_ACCESS_KEY\""
          fi
          if [ -n "${RESEND_API_KEY:-}" ]; then
            OPTIONAL_BACKEND_ENV="$OPTIONAL_BACKEND_ENV,RESEND_API_KEY=\"$RESEND_API_KEY\""
          fi
           if [ -n "${REVALIDATE_TIMEOUT_MS:-}" ]; then
             OPTIONAL_BACKEND_ENV="$OPTIONAL_BACKEND_ENV,REVALIDATE_TIMEOUT_MS=\"$REVALIDATE_TIMEOUT_MS\""
           fi
