  cutover:plan:
    desc: Print the production cutover order and commands
    dotenv: [.env]
    cmds:
      - bash scripts/production/cutover.sh --dry-run

  deploy:backend:
    desc: Deploy the backend Payload instance to Railway production
    dotenv: [.env]
    preconditions:
      - sh: test -n "${RAILWAY_TOKEN:-}"
        msg: Missing RAILWAY_TOKEN in repo-root .env.
      - sh: test -n "${RAILWAY_PROJECT_ID:-}"
        msg: Missing RAILWAY_PROJECT_ID in repo-root .env.
      - sh: test -n "${R2_ACCESS_KEY_ID:-}"
        msg: Missing R2_ACCESS_KEY_ID in repo-root .env.
      - sh: test -n "${R2_BUCKET:-}"
        msg: Missing R2_BUCKET in repo-root .env.
      - sh: test -n "${R2_ENDPOINT:-}"
        msg: Missing R2_ENDPOINT in repo-root .env.
      - sh: test -n "${R2_PUBLIC_BASE_URL:-}"
        msg: Missing R2_PUBLIC_BASE_URL in repo-root .env.
      - sh: test -n "${R2_SECRET_ACCESS_KEY:-}"
        msg: Missing R2_SECRET_ACCESS_KEY in repo-root .env.
      - sh: test -n "${RESEND_API_KEY:-}"
        msg: Missing RESEND_API_KEY in repo-root .env.
    cmds:
      - |
        set -eu
        devbox run railway variable set \
          R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
          R2_BUCKET="$R2_BUCKET" \
          R2_ENDPOINT="$R2_ENDPOINT" \
          R2_PUBLIC_BASE_URL="$R2_PUBLIC_BASE_URL" \
          R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
          RESEND_API_KEY="$RESEND_API_KEY" \
          --service open-agency-backend-production \
          --environment production \
          --skip-deploys

        devbox run railway variables --service open-agency-backend-production
        devbox run railway service open-agency-backend-production || true
        devbox run railway up ./backend/openagency-backend --path-as-root --project "$RAILWAY_PROJECT_ID" --service open-agency-backend-production --environment production --ci
        sleep 45
        devbox run railway status open-agency-backend-production || true
        devbox run railway logs open-agency-backend-production --tail 100 || true

  deploy:migrate:
    desc: Run production Payload migrations using root .env secrets
    dotenv: [.env]
    cmds:
      - |
        set -eu
        DATABASE_URL="${BACKEND_DATABASE_URL:?BACKEND_DATABASE_URL is required}" \
        PAYLOAD_SECRET="${BACKEND_PAYLOAD_SECRET:?BACKEND_PAYLOAD_SECRET is required}" \
        CRON_SECRET="${BACKEND_CRON_SECRET:?BACKEND_CRON_SECRET is required}" \
        PREVIEW_SECRET="${BACKEND_PREVIEW_SECRET:?BACKEND_PREVIEW_SECRET is required}" \
        REVALIDATE_SECRET="${BACKEND_REVALIDATE_SECRET:?BACKEND_REVALIDATE_SECRET is required}" \
        NEXT_PUBLIC_SERVER_URL="${NEXT_PUBLIC_SERVER_URL:-https://admin.open-agency.io}" \
        MARKETING_APP_BASE_URL="${MARKETING_APP_BASE_URL:-https://open-agency.io}" \
        COURSES_APP_BASE_URL="${COURSES_APP_BASE_URL:-https://courses.open-agency.io}" \
        MARKETING_REVALIDATE_URL="${MARKETING_REVALIDATE_URL:-}" \
        COURSES_REVALIDATE_URL="${COURSES_REVALIDATE_URL:-}" \
        REVALIDATE_TIMEOUT_MS="${REVALIDATE_TIMEOUT_MS:-5000}" \
        pnpm --dir backend/openagency-backend exec payload migrate --yes

  deploy:verify:
    desc: Run production smoke checks against backend and frontend URLs
    dotenv: [.env]
    cmds:
      - bash scripts/production/smoke-check.sh

  restore:drill:plan:
    desc: Print the isolated restore drill steps and smoke checks
    dotenv: [.env]
    cmds:
      - bash scripts/production/isolated-restore-drill.sh --dry-run
