           fi
           if [ -n "${COURSES_REVALIDATE_URL:-}" ]; then
             OPTIONAL_BACKEND_ENV="$OPTIONAL_BACKEND_ENV,COURSES_REVALIDATE_URL=\"$COURSES_REVALIDATE_URL\""
           fi
         if [ -n "$OPTIONAL_BACKEND_ENV" ]; then
           VARS="$VARS -var=backend_optional_environment={${OPTIONAL_BACKEND_ENV#,}}"
         fi

        if [ -n "${R2_ENABLED:-}" ]; then
          VARS="$VARS -var=r2_enabled=$R2_ENABLED"
        fi
        if [ -n "${R2_PUBLIC_HOSTNAME:-}" ]; then
          VARS="$VARS -var=r2_public_hostname=$R2_PUBLIC_HOSTNAME"
        fi
        VARS="$VARS -var=marketing_app_base_url=${MARKETING_APP_BASE_URL:-https://open-agency.io}"
        VARS="$VARS -var=courses_app_base_url=${COURSES_APP_BASE_URL:-https://courses.open-agency.io}"

        if [ -n "${BACKEND_PAYLOAD_SECRET:-}" ] && [ -n "${BACKEND_CRON_SECRET:-}" ] && [ -n "${BACKEND_PREVIEW_SECRET:-}" ] && [ -n "${BACKEND_REVALIDATE_SECRET:-}" ]; then
          VARS="$VARS -var=backend_secret_environment={PAYLOAD_SECRET=\"$BACKEND_PAYLOAD_SECRET\",CRON_SECRET=\"$BACKEND_CRON_SECRET\",PREVIEW_SECRET=\"$BACKEND_PREVIEW_SECRET\",REVALIDATE_SECRET=\"$BACKEND_REVALIDATE_SECRET\"}"
        fi

        devbox run tofu -chdir=infra/environments/production apply -auto-approve $VARS -verbose

  deploy:destroy:
    desc: Destroy production infrastructure with local env config
    dotenv: [.env]
    prompt: true
    cmds:
      - |
        set -eu
        VARS=""

        if [ -n "${RAILWAY_ENABLED:-}" ]; then
          VARS="$VARS -var=railway_enabled=$RAILWAY_ENABLED"
        fi
        if [ -n "${RAILWAY_PROJECT_NAME:-}" ]; then
          VARS="$VARS -var=railway_project_name=$RAILWAY_PROJECT_NAME"
        fi
        if [ -n "${VERCEL_ENABLED:-}" ]; then
          VARS="$VARS -var=vercel_enabled=$VERCEL_ENABLED"
        fi
        if [ -n "${VERCEL_TEAM:-}" ]; then
          VARS="$VARS -var=vercel_team=$VERCEL_TEAM"
        fi
        VARS="$VARS -var=marketing_vercel_project_name=${MARKETING_VERCEL_PROJECT_NAME:-open-agency-marketing}"
        VARS="$VARS -var=marketing_vercel_domain=${MARKETING_VERCEL_DOMAIN:-open-agency.io}"
        if [ -n "${POSTGRES_DATABASE_NAME:-}" ]; then
          VARS="$VARS -var=postgres_database_name=$POSTGRES_DATABASE_NAME"
        fi
        if [ -n "${POSTGRES_USER:-}" ]; then
          VARS="$VARS -var=postgres_user=$POSTGRES_USER"
        fi
        if [ -n "${POSTGRES_PASSWORD:-}" ]; then
          VARS="$VARS -var=postgres_password=$POSTGRES_PASSWORD"
        fi
        if [ -n "${RAILWAY_TOKEN:-}" ]; then
          VARS="$VARS -var=railway_token=$RAILWAY_TOKEN"
        fi
        if [ -n "${VERCEL_API_TOKEN:-}" ]; then
