version: '3'

includes:
  dev:
    taskfile: ci/development.yaml
  production:
    taskfile: ci/production.yaml
  tofu:
    taskfile: ci/tofu/tasks.yml

vars:
  BACKEND_DIR: backend/openagency-backend
  FRONTEND_DIR: frontend
  DOCKER_COMPOSE_FILE: docker-compose.yml
  BACKEND_PORT: '3002'
  MARKETING_PORT: '3000'
  COURSES_PORT: '3001'

tasks:
  default:
    cmds:
      - task --list
  setup:
    desc: Bootstraps the repo for local development
    cmds:
      - bash scripts/setup.sh
  dev:
    desc: Start the local database, Payload CMS, and frontend apps together
    cmds:
      - task dev:prepare
      - task --parallel dev-backend dev-frontend
  dev-frontend:
    desc: Start the marketing and courses apps
    cmds:
      - task --parallel dev:marketing dev:courses

  dev:marketing:
    desc: Start marketing app only
    cmds:
      - pnpm --dir {{.FRONTEND_DIR}}/apps/marketing dev

  dev:courses:
    desc: Start courses app only
    env:
      PAYLOAD_API_URL: http://localhost:3002/api
    cmds:
      - pnpm --dir {{.FRONTEND_DIR}}/apps/courses dev

  dev:marketing:prod-api:
    desc: Start marketing locally against the production CMS API
    env:
      PORT: '{{.MARKETING_PORT}}'
      NEXT_PUBLIC_SERVER_URL: http://localhost:{{.MARKETING_PORT}}
      NEXT_PUBLIC_API_URL: https://admin.open-agency.io/api
      PAYLOAD_API_URL: https://admin.open-agency.io/api
    cmds:
      - pnpm --dir {{.FRONTEND_DIR}}/apps/marketing dev
  dev-backend:
    desc: Start Payload CMS only
    cmds:
      - task dev:backend

  dev:prepare:
    desc: Run local development preflight tasks
    cmds:
      - task dev:ensure-env
      - task dev:clear-ports
      - task dev:db:start
      - task dev:db:wait
      - task dev:cms:migrate

  dev:ensure-env:
    desc: Verify local environment files and required backend variables exist
    preconditions:
      - sh: test -f {{.BACKEND_DIR}}/.env
        msg: Missing {{.BACKEND_DIR}}/.env. Run `task setup` first.
      - sh: test -f {{.FRONTEND_DIR}}/apps/marketing/.env.local
        msg: Missing {{.FRONTEND_DIR}}/apps/marketing/.env.local. Run `task setup` first.
      - sh: test -f {{.FRONTEND_DIR}}/apps/courses/.env.local
        msg: Missing {{.FRONTEND_DIR}}/apps/courses/.env.local. Run `task setup` first.
      - sh: grep -q '^MARKETING_APP_BASE_URL=' {{.BACKEND_DIR}}/.env
        msg: Missing MARKETING_APP_BASE_URL in {{.BACKEND_DIR}}/.env.
      - sh: grep -q '^COURSES_APP_BASE_URL=' {{.BACKEND_DIR}}/.env
        msg: Missing COURSES_APP_BASE_URL in {{.BACKEND_DIR}}/.env.
      - sh: grep -q '^REVALIDATE_SECRET=' {{.BACKEND_DIR}}/.env
        msg: Missing REVALIDATE_SECRET in {{.BACKEND_DIR}}/.env.
      - sh: test "$(grep '^REVALIDATE_SECRET=' {{.BACKEND_DIR}}/.env | cut -d= -f2-)" = "$(grep '^REVALIDATE_SECRET=' {{.FRONTEND_DIR}}/apps/marketing/.env.local | cut -d= -f2-)"
        msg: REVALIDATE_SECRET must match between {{.BACKEND_DIR}}/.env and {{.FRONTEND_DIR}}/apps/marketing/.env.local.
      - sh: test "$(grep '^REVALIDATE_SECRET=' {{.BACKEND_DIR}}/.env | cut -d= -f2-)" = "$(grep '^REVALIDATE_SECRET=' {{.FRONTEND_DIR}}/apps/courses/.env.local | cut -d= -f2-)"
        msg: REVALIDATE_SECRET must match between {{.BACKEND_DIR}}/.env and {{.FRONTEND_DIR}}/apps/courses/.env.local.

  dev:clear-ports:
    desc: Clear local app ports before development startup
    cmds:
      - task dev:clear-port PORT={{.MARKETING_PORT}}
      - task dev:clear-port PORT={{.COURSES_PORT}}
      - task dev:clear-port PORT={{.BACKEND_PORT}}

  dev:clear-port:
    desc: Clear a single local TCP port
    requires:
      vars: [PORT]
    cmds:
      - |
        set -eu
        pids="$(lsof -ti tcp:{{.PORT}} || true)"
        if [ -z "$pids" ]; then
          echo "Port {{.PORT}} is already clear"
          exit 0
        fi

        echo "Stopping processes on port {{.PORT}}"
        printf '%s\n' "$pids" | xargs kill -TERM
        sleep 1

        remaining="$(lsof -ti tcp:{{.PORT}} || true)"
        if [ -n "$remaining" ]; then
          echo "Force stopping remaining processes on port {{.PORT}}"
          printf '%s\n' "$remaining" | xargs kill -KILL
        fi

  dev:db:start:
    desc: Start the local Postgres container
    cmds:
      - |
        set -eu
        if docker compose version >/dev/null 2>&1; then
          docker compose -f {{.DOCKER_COMPOSE_FILE}} up -d postgres
        elif docker-compose version >/dev/null 2>&1; then
          docker-compose -f {{.DOCKER_COMPOSE_FILE}} up -d postgres
        else
          echo "Docker Compose (docker compose or docker-compose) is required" >&2
          exit 1
        fi

  dev:db:wait:
    desc: Wait for the local Postgres container to accept connections
    cmds:
      - |
        set -eu
        if docker compose version >/dev/null 2>&1; then
          compose_cmd='docker compose'
        elif docker-compose version >/dev/null 2>&1; then
          compose_cmd='docker-compose'
        else
          echo "Docker Compose (docker compose or docker-compose) is required" >&2
          exit 1
        fi

        postgres_container="$($compose_cmd -f {{.DOCKER_COMPOSE_FILE}} ps -q postgres)"
        if [ -z "$postgres_container" ]; then
          echo "Could not determine the postgres container ID" >&2
          exit 1
        fi

        echo -n 'Waiting for Postgres to accept connections'
        until docker exec "$postgres_container" pg_isready -U open_agency >/dev/null 2>&1; do
          echo -n '.'
          sleep 1
        done
        echo ' done'

  dev:cms:migrate:
    desc: Verify CMS database connectivity by running Payload migrations
    cmds:
      - pnpm --dir {{.BACKEND_DIR}} exec payload migrate --yes

  deploy:plan:
    desc: Plan production infrastructure with local env configuration
    cmds:
      - task production:deploy:plan

  deploy:apply:
    desc: Apply production infrastructure with local env configuration
    cmds:
      - task production:deploy:apply

  deploy:destroy:
    desc: Destroy production infrastructure with local env configuration
    cmds:
      - task production:deploy:destroy

  cutover:plan:
    desc: Print the production cutover order and commands
    cmds:
      - task production:cutover:plan

  deploy:migrate:
    desc: Run production Payload migrations using the repo-root .env
    cmds:
      - task production:deploy:migrate

  deploy:verify:
    desc: Run production smoke checks
    cmds:
      - task production:deploy:verify

  deploy:backend:
    desc: Deploy the backend Payload instance to Railway production
    cmds:
      - task production:deploy:backend

  restore:drill:plan:
    desc: Print the isolated restore drill steps and smoke checks
    cmds:
      - task production:restore:drill:plan

  prd:db-forward:
    desc: Connect to production PostgreSQL via railway connect
    cmds:
      - echo "Connecting to production PostgreSQL..."
      - railway connect postgres --environment production

  dev:backend:
    desc: Start Payload CMS only
    env:
      PORT: '{{.BACKEND_PORT}}'
      NEXT_PUBLIC_SERVER_URL: http://localhost:{{.BACKEND_PORT}}
    cmds:
      - pnpm --dir {{.BACKEND_DIR}} dev
